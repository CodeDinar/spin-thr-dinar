<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undian THR Interactive</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
        }

        h1 {
            color: var(--secondary-color);
            margin-bottom: 20px;
            cursor: pointer; /* Memberi petunjuk bisa diklik (opsional) */
            user-select: none;
        }

        /* Jarum Penunjuk */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--primary-color);
            z-index: 10;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
            cursor: pointer; /* Tombol rahasia */
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 0 0 10px white, 0 0 25px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            max-width: 90vw;
            max-height: 90vw;
        }

        .spin-button {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .spin-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.6);
        }

        .spin-button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="titleCheat">🎡 Keberuntungan THR</h1>
        
        <div class="pointer" id="pointerCheat"></div>
        
        <canvas id="wheel" width="400" height="400"></canvas>
        <br>
        <button class="spin-button" id="spinBtn" onclick="spinWheel()">Putar Sekarang!</button>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const titleBtn = document.getElementById('titleCheat');
        const pointerBtn = document.getElementById('pointerCheat');

        // KONFIGURASI 1: Mode Hemat (Default)
        const prizesDefault = [
            { label: "100.000", color: "#FFD700", weight: 0 },
            { label: "50.000",  color: "#FF5733", weight: 0 },
            { label: "20.000",  color: "#33FF57", weight: 0 },
            { label: "10.000",  color: "#3357FF", weight: 2 },
            { label: "5.000",   color: "#F333FF", weight: 8 },
            { label: "2.000",   color: "#FFB833", weight: 15 },
            { label: "1.000",   color: "#33FFF5", weight: 30 },
            { label: "500",     color: "#A133FF", weight: 45 }
        ];

        // KONFIGURASI 2: Mode Sultan
        const prizesSultan = [
            { label: "100.000", color: "#FFD700", weight: 50 },
            { label: "50.000",  color: "#FF5733", weight: 50 },
            { label: "20.000",  color: "#33FF57", weight: 0 },
            { label: "10.000",  color: "#3357FF", weight: 0 },
            { label: "5.000",   color: "#F333FF", weight: 0 },
            { label: "2.000",   color: "#FFB833", weight: 0 },
            { label: "1.000",   color: "#33FFF5", weight: 0 },
            { label: "500",     color: "#A133FF", weight: 0 }
        ];

        // Variabel aktif yang akan digunakan saat spin
        let activePrizes = [...prizesDefault];

        // LOGIKA SWITCH RAHASIA
        titleBtn.onclick = () => {
            activePrizes = [...prizesDefault];
            console.log("Mode: Hemat Aktif"); // Bisa dihapus agar tidak ketahuan di console
        };

        pointerBtn.onclick = () => {
            activePrizes = [...prizesSultan];
            console.log("Mode: Sultan Aktif"); // Bisa dihapus agar tidak ketahuan di console
        };

        const numSegments = activePrizes.length;
        const segmentAngle = 360 / numSegments;
        let totalRotation = 0;

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;

            activePrizes.forEach((prize, i) => {
                const startAngle = (i * segmentAngle * Math.PI) / 180;
                const endAngle = ((i + 1) * segmentAngle * Math.PI) / 180;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = prize.color;
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + (segmentAngle * Math.PI) / 360);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px Arial";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.fillText(prize.label, radius - 20, 10);
                ctx.restore();
            });
        }

        function getWeightedPrizeIndex() {
            const totalWeight = activePrizes.reduce((sum, p) => sum + p.weight, 0);
            let random = Math.random() * totalWeight;
            for (let i = 0; i < activePrizes.length; i++) {
                if (random < activePrizes[i].weight) return i;
                random -= activePrizes[i].weight;
            }
            return activePrizes.length - 1;
        }

        function spinWheel() {
            spinBtn.disabled = true;

            const selectedIndex = getWeightedPrizeIndex();
            const minSpins = 360 * 5; 
            const targetOffset = (270 - (selectedIndex * segmentAngle) - (segmentAngle / 2));
            
            const currentNormalized = totalRotation % 360;
            let distanceToTarget = (targetOffset - currentNormalized);
            
            if (distanceToTarget <= 0) {
                distanceToTarget += 360;
            }

            totalRotation += minSpins + distanceToTarget;
            canvas.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                const finalPrize = activePrizes[selectedIndex].label;
                
                Swal.fire({
                    title: '🎉 Selamat!',
                    html: `Anda mendapatkan THR sebesar:<br><b style="font-size: 24px; color: #e74c3c;">Rp ${finalPrize}</b>`,
                    icon: 'success',
                    confirmButtonText: 'Ambil Hadiah',
                    confirmButtonColor: '#e74c3c'
                });

                spinBtn.disabled = false;
            }, 4000);
        }

        drawWheel();
    </script>
</body>
</html>
